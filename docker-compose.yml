version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reservations}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: alembic upgrade head
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      BOT_TOKEN: ${BOT_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python scripts/seed_countries.py
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_1_ID: ${CHANNEL_1_ID:-}
      CHANNEL_1_NAME: ${CHANNEL_1_NAME:-Channel 1}
      CHANNEL_1_INVITE: ${CHANNEL_1_INVITE:-}
      CHANNEL_2_ID: ${CHANNEL_2_ID:-}
      CHANNEL_2_NAME: ${CHANNEL_2_NAME:-Channel 2}
      CHANNEL_2_INVITE: ${CHANNEL_2_INVITE:-}
      CHANNEL_3_ID: ${CHANNEL_3_ID:-}
      CHANNEL_3_NAME: ${CHANNEL_3_NAME:-Channel 3}
      CHANNEL_3_INVITE: ${CHANNEL_3_INVITE:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      # ── Infrastructure ────────────────────────────────────────────
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-reservations}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # ── Bot ───────────────────────────────────────────────────────
      BOT_TOKEN: ${BOT_TOKEN}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # ── Application ───────────────────────────────────────────────
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      TIMEZONE: ${TIMEZONE:-Asia/Baghdad}
      ADMIN_IDS: ${ADMIN_IDS:-}
      # ── Reservation rules ─────────────────────────────────────────
      MAX_ACTIVE_RESERVATIONS: ${MAX_ACTIVE_RESERVATIONS:-10}
      MAX_RESERVATION_DAYS_AHEAD: ${MAX_RESERVATION_DAYS_AHEAD:-14}
      CHANNEL_CAPACITY_THRESHOLD: ${CHANNEL_CAPACITY_THRESHOLD:-0.70}
      SAME_DAY_CUTOFF_HOUR: ${SAME_DAY_CUTOFF_HOUR:-12}
      SAME_DAY_CANCEL_CUTOFF_HOUR: ${SAME_DAY_CANCEL_CUTOFF_HOUR:-12}
      # ── Slot schedule ─────────────────────────────────────────────
      SLOT_START_HOUR: ${SLOT_START_HOUR:-16}
      SLOT_END_HOUR: ${SLOT_END_HOUR:-24}
      SLOT_DURATION_MINUTES: ${SLOT_DURATION_MINUTES:-30}
      ENABLE_FINAL_MIDNIGHT_SLOT: ${ENABLE_FINAL_MIDNIGHT_SLOT:-true}
      FINAL_SLOT_TIME: ${FINAL_SLOT_TIME:-23:59}
      # ── Notifications & Reminders ─────────────────────────────────
      SAME_DAY_REMINDER_HOUR: ${SAME_DAY_REMINDER_HOUR:-12}
      PRE_SESSION_REMINDER_MINUTES: ${PRE_SESSION_REMINDER_MINUTES:-30}
      # ── Daily Broadcast ───────────────────────────────────────────
      DAILY_BROADCAST_HOUR: ${DAILY_BROADCAST_HOUR:-12}
      ENABLE_BROADCAST_AUTO_PIN: ${ENABLE_BROADCAST_AUTO_PIN:-true}
      DELETE_PREVIOUS_BROADCAST: ${DELETE_PREVIOUS_BROADCAST:-false}
      # ── Channels ──────────────────────────────────────────────────
      CHANNEL_1_ID: ${CHANNEL_1_ID:-}
      CHANNEL_1_NAME: ${CHANNEL_1_NAME:-}
      CHANNEL_1_INVITE: ${CHANNEL_1_INVITE:-}
      CHANNEL_2_ID: ${CHANNEL_2_ID:-}
      CHANNEL_2_NAME: ${CHANNEL_2_NAME:-}
      CHANNEL_2_INVITE: ${CHANNEL_2_INVITE:-}
      CHANNEL_3_ID: ${CHANNEL_3_ID:-}
      CHANNEL_3_NAME: ${CHANNEL_3_NAME:-}
      CHANNEL_3_INVITE: ${CHANNEL_3_INVITE:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
